<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main>

        <section id="form-container">
            <h1>Mis contactos</h1>
            <form action="#" id="form-add">
                <input type="text" name="input-name" placeholder="Nombre...">
                <input type="number" name="input-tel" placeholder="Telefono...">

                <button type="submit" id="btn-submit">Añadir</button>
            </form>
        </section>

        <section id="numeros">
            <input id="busqueda" type="text" placeholder="Buscar...">

            <ul id="lista-numeros">
                <p>Vacio!</p>
            </ul>

            <p class="copyright">Copyright - TICUA07 ©</p>
        </section>

    </main>

    <div class="menu-importar">
        <button onclick="exportarContactos()">Exportar contactos</button>
        <button onclick="importarContactosDialog()">Importar contactos</button>
    </div>

    <dialog id="dialog">
        <!-- Este dialog se modifica con JS -->
    </dialog>

    <script src="script.js"></script>

</body>

</html>
